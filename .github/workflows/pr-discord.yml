name: PR Discord Notification

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: read

concurrency:
  group: discord-notifications
  cancel-in-progress: false

jobs:
  notify:
    name: Send Discord Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate Webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ ! "$DISCORD_WEBHOOK_URL" =~ ^https://discord\.com/api/webhooks/ ]]; then
            echo "::error::Invalid Discord webhook URL format"
            exit 1
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          # Get PR data using GitHub's JSON escaping
          PR_TITLE='${{ github.event.pull_request.title }}'
          PR_URL='${{ github.event.pull_request.html_url }}'
          PR_AUTHOR='${{ github.event.pull_request.user.login }}'
          PR_REPO='${{ github.repository }}'
          PR_CREATED_AT='${{ github.event.pull_request.created_at }}'

          # Handle PR body - use toJson for proper escaping, then process in jq
          PR_BODY_JSON='${{ toJson(github.event.pull_request.body) }}'

          # Build payload using jq with proper JSON handling
          PAYLOAD=$(jq -n \
            --arg title "$PR_TITLE" \
            --argjson body "$PR_BODY_JSON" \
            --arg author "$PR_AUTHOR" \
            --arg url "$PR_URL" \
            --arg repo "$PR_REPO" \
            --arg timestamp "$PR_CREATED_AT" \
            '{
              embeds: [{
                title: ("PR: " + ($title | if length > 200 then .[:200] + "..." else . end)),
                description: (($body // "No description provided.") | if length > 3900 then .[:3900] + "..." else . end),
                url: $url,
                color: 3447003,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Author", value: $author, inline: true }
                ],
                timestamp: $timestamp
              }]
            }')

          # Debug: show payload structure (without sensitive data)
          echo "Payload structure validated"

          # Send to Discord
          HTTP_CODE=$(curl -s -o /tmp/discord_response.txt -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          BODY=$(cat /tmp/discord_response.txt)

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "204" ]]; then
            echo "::error::Discord webhook failed with status $HTTP_CODE"
            echo "Response body: $BODY"
            exit 1
          fi

          echo "Discord notification sent successfully"
