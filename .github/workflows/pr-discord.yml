name: PR Discord Notification

on:
  pull_request:
    types: [opened]

permissions:
  pull-requests: read

concurrency:
  group: discord-notifications
  cancel-in-progress: false

jobs:
  notify:
    name: Send Discord Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate Webhook URL
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          if [[ ! "$DISCORD_WEBHOOK_URL" =~ ^https://discord\.com/api/webhooks/ ]]; then
            echo "::error::Invalid Discord webhook URL format"
            exit 1
          fi

      - name: Send Discord Notification
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_REPO: ${{ github.repository }}
          PR_CREATED_AT: ${{ github.event.pull_request.created_at }}
        run: |
          # Handle empty PR body with fallback
          DESCRIPTION="${PR_BODY:-No description provided.}"
          # Truncate description to 3900 chars (Discord embed limit is 4096)
          DESCRIPTION=$(printf '%s' "$DESCRIPTION" | cut -c1-3900)

          # Truncate title to 200 chars (Discord embed title limit is 256)
          TITLE=$(printf '%s' "$PR_TITLE" | cut -c1-200)

          # Build JSON payload safely with jq
          PAYLOAD=$(jq -n \
            --arg title "$TITLE" \
            --arg description "$DESCRIPTION" \
            --arg author "$PR_AUTHOR" \
            --arg url "$PR_URL" \
            --arg repo "$PR_REPO" \
            --arg timestamp "$PR_CREATED_AT" \
            '{
              embeds: [{
                title: ("PR: " + $title),
                description: $description,
                url: $url,
                color: 3447003,
                fields: [
                  { name: "Repository", value: $repo, inline: true },
                  { name: "Author", value: $author, inline: true }
                ],
                timestamp: $timestamp
              }]
            }')

          # Send to Discord
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL")

          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [[ "$HTTP_CODE" != "200" && "$HTTP_CODE" != "204" ]]; then
            echo "::error::Discord webhook failed with status $HTTP_CODE"
            echo "Response body: $BODY"
            exit 1
          fi

          echo "Discord notification sent successfully"
