name: Discord PR Notification

on:
  pull_request:
    types: [opened]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Validate webhook URL exists and has correct format
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Error: DISCORD_WEBHOOK_URL secret not configured"
            exit 1
          fi

          if [[ ! "$DISCORD_WEBHOOK" =~ ^https://discord\.com/api/webhooks/ ]]; then
            echo "Error: DISCORD_WEBHOOK_URL doesn't appear to be a valid Discord webhook"
            exit 1
          fi

          # Construct the Discord payload safely using jq
          # Discord embed description limit is 4096 chars, truncate at 3900 to be safe
          payload=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg body "$PR_BODY" \
            --arg url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg repo "$PR_REPO" \
            '{
              "embeds": [{
                "title": "New Pull Request",
                "description": ("**\($title)**\n\n" + (($body // "No description provided") | (if length > 3900 then .[0:3900] + "\n\n...(description truncated)" else . end))),
                "url": $url,
                "color": 3447003,
                "fields": [
                  {
                    "name": "Author",
                    "value": $author,
                    "inline": true
                  },
                  {
                    "name": "Repository",
                    "value": $repo,
                    "inline": true
                  }
                ]
              }]
            }')

          # Send to Discord with error handling
          http_code=$(curl -H "Content-Type: application/json" \
                          -X POST \
                          -d "$payload" \
                          -w "%{http_code}" \
                          -s \
                          -o /tmp/discord_response.txt \
                          "$DISCORD_WEBHOOK")

          if [ "$http_code" != "204" ] && [ "$http_code" != "200" ]; then
            echo "Discord notification failed with status $http_code"
            cat /tmp/discord_response.txt
            exit 1
          fi

          echo "Discord notification sent successfully"
