name: Discord PR Notification

on:
  pull_request:
    types: [opened]

jobs:
  notify-discord:
    runs-on: ubuntu-latest
    steps:
      - name: Send Discord notification
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # Validate webhook URL exists and has correct format
          if [ -z "$DISCORD_WEBHOOK" ]; then
            echo "Error: DISCORD_WEBHOOK_URL secret not configured"
            exit 1
          fi

          if [[ ! "$DISCORD_WEBHOOK" =~ ^https://discord\.com/api/webhooks/ ]]; then
            echo "Error: DISCORD_WEBHOOK_URL doesn't appear to be a valid Discord webhook"
            exit 1
          fi

          # For Dependabot PRs, use a simple description
          # For regular PRs, use first 500 chars of body
          if [[ "$PR_AUTHOR" == "dependabot[bot]" ]]; then
            DESCRIPTION="Automated dependency update. Click the link above to review changes."
          else
            # Strip <details> blocks and truncate
            DESCRIPTION=$(echo "$PR_BODY" | sed 's/<details>.*<\/details>//g' | head -c 500)
            if [ ${#PR_BODY} -gt 500 ]; then
              DESCRIPTION="${DESCRIPTION}..."
            fi
            if [ -z "$DESCRIPTION" ]; then
              DESCRIPTION="No description provided."
            fi
          fi

          # Construct the Discord payload safely using jq
          payload=$(jq -n \
            --arg title "$PR_TITLE" \
            --arg desc "$DESCRIPTION" \
            --arg url "$PR_URL" \
            --arg author "$PR_AUTHOR" \
            --arg repo "$PR_REPO" \
            '{
              "embeds": [{
                "title": ("PR: " + $title),
                "description": $desc,
                "url": $url,
                "color": 3447003,
                "fields": [
                  {
                    "name": "Author",
                    "value": $author,
                    "inline": true
                  },
                  {
                    "name": "Repository",
                    "value": $repo,
                    "inline": true
                  }
                ]
              }]
            }')

          # Send to Discord with error handling
          http_code=$(curl -H "Content-Type: application/json" \
                          -X POST \
                          -d "$payload" \
                          -w "%{http_code}" \
                          -s \
                          -o /tmp/discord_response.txt \
                          "$DISCORD_WEBHOOK")

          if [ "$http_code" != "204" ] && [ "$http_code" != "200" ]; then
            echo "Discord notification failed with status $http_code"
            cat /tmp/discord_response.txt
            exit 1
          fi

          echo "Discord notification sent successfully"
