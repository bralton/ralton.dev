name: Accessibility CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lighthouse-accessibility:
    name: Lighthouse Accessibility Audit
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      PAYLOAD_SECRET: ci-test-secret-not-for-production

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run migrations
        run: npx payload migrate

      - name: Seed test data
        run: npx tsx scripts/seed-ci.ts

      - name: Build Next.js app
        run: npx next build

      - name: Start server for validation
        run: |
          npm run start &
          sleep 10

      - name: Validate sitemap.xml
        run: |
          echo "Fetching sitemap.xml..."
          SITEMAP=$(curl -s -f http://localhost:3000/sitemap.xml)
          if [ $? -ne 0 ]; then
            echo "❌ Failed to fetch sitemap.xml"
            exit 1
          fi
          echo "✅ sitemap.xml is accessible"

          # Verify XML structure
          if echo "$SITEMAP" | grep -q "<urlset"; then
            echo "✅ Contains <urlset> element"
          else
            echo "❌ Missing <urlset> element"
            exit 1
          fi

          if echo "$SITEMAP" | grep -q "<loc>"; then
            echo "✅ Contains <loc> element"
          else
            echo "❌ Missing <loc> element"
            exit 1
          fi

          if echo "$SITEMAP" | grep -q "changefreq"; then
            echo "✅ Contains changefreq"
          else
            echo "❌ Missing changefreq"
            exit 1
          fi

          echo "Sitemap content:"
          echo "$SITEMAP"
          echo ""
          echo "✅ Sitemap validation passed!"

      - name: Validate robots.txt
        run: |
          echo "Fetching robots.txt..."
          ROBOTS=$(curl -s -f http://localhost:3000/robots.txt)
          if [ $? -ne 0 ]; then
            echo "❌ Failed to fetch robots.txt"
            exit 1
          fi
          echo "✅ robots.txt is accessible"

          # Verify required directives
          if echo "$ROBOTS" | grep -q "User-agent:"; then
            echo "✅ Contains User-agent directive"
          else
            echo "❌ Missing User-agent directive"
            exit 1
          fi

          if echo "$ROBOTS" | grep -q "Allow: /"; then
            echo "✅ Contains Allow: / directive"
          else
            echo "❌ Missing Allow: / directive"
            exit 1
          fi

          if echo "$ROBOTS" | grep -q "Disallow: /admin"; then
            echo "✅ Contains Disallow: /admin directive"
          else
            echo "❌ Missing Disallow: /admin directive"
            exit 1
          fi

          if echo "$ROBOTS" | grep -q "Disallow: /api/"; then
            echo "✅ Contains Disallow: /api/ directive"
          else
            echo "❌ Missing Disallow: /api/ directive"
            exit 1
          fi

          if echo "$ROBOTS" | grep -q "Sitemap:"; then
            echo "✅ Contains Sitemap directive"
          else
            echo "❌ Missing Sitemap directive"
            exit 1
          fi

          echo ""
          echo "robots.txt content:"
          echo "$ROBOTS"
          echo ""
          echo "✅ robots.txt validation passed!"

      - name: Stop background server
        run: pkill -f "next start" || true

      - name: Run Lighthouse CI
        id: lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
          artifactName: lighthouse-results
