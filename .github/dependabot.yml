version: 2
updates:
  # npm dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
      time: '09:00'
      timezone: 'America/New_York'
    target-branch: 'main'
    open-pull-requests-limit: 5
    commit-message:
      prefix: 'chore(deps)'
    labels:
      - 'dependencies'
      - 'automated'
    reviewers:
      - 'bralton'
    groups:
      opentelemetry:
        patterns:
          - '@opentelemetry/*'
      vercel:
        patterns:
          - '@vercel/*'
      all-other:
        patterns:
          - '*'
        exclude-patterns:
          - '@opentelemetry/*'
          - '@vercel/*'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    commit-message:
      prefix: 'ci(deps)'
    labels:
      - 'ci'
      - 'automated'
    groups:
      github-actions:
        patterns:
          - '*'
